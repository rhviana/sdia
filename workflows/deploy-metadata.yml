---

### GitHub Action: Automated Metadata Deployment
##  Location: .github/workflows/deploy-metadata.yml

This script implements a GitOps approach to SAP BTP governance. Whenever you update your templates/kvm-config.json, this action automatically synchronizes the new routing metadata with your SAP API Management KVM.

---

YAML
name: DCRP Metadata CI/CD
on:
  push:
    branches:
      - main
    paths:
      - 'templates/kvm-config.json' # Triggers only when routing metadata changes

jobs:
  deploy-kvm:
    name: Sync KVM to SAP BTP
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Obtain SAP OAuth2 Token
        id: sap_auth
        run: |
          # Requesting access token from SAP BTP Auth service
          RESPONSE=$(curl -s -X POST "${{ secrets.SAP_AUTH_URL }}" \
            -d "grant_type=client_credentials" \
            -u "${{ secrets.SAP_CLIENT_ID }}:${{ secrets.SAP_CLIENT_SECRET }}")
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Update DCRP Routing Metadata (KVM)
        run: |
          # Deploying new KVM entry to SAP API Management
          # This enables 30-second onboarding without proxy redeployment
          curl -X PUT "${{ secrets.SAP_APIM_API_URL }}/KeyValueMaps('cpipackage-sales-o2c')" \
            -H "Authorization: Bearer ${{ steps.sap_auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d @templates/kvm-config.json

      - name: Deployment Success Notification
        if: success()
        run: echo "DCRP Metadata successfully synchronized with SAP APIM."

---

🛡️ Required Secrets Configuration
To make this work, go to Settings > Secrets and variables > Actions in your GitHub repository and add:

SAP_AUTH_URL: Your SAP BTP XSUAA authentication URL.
SAP_CLIENT_ID: Service key Client ID.
SAP_CLIENT_SECRET: Service key Client Secret.
SAP_APIM_API_URL: The management API URL for your SAP API Management tenant.

