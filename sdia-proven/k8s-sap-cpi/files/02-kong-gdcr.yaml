apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative
  namespace: sdia
data:
  kong.yaml: |
    _format_version: "3.0"
    _transform: true

    services:
    - name: cpi-service
      url: https://282cc9datrial.it-cpitrial05-rt.cfapps.us10-001.hana.ondemand.com
      protocol: https
      port: 443
      routes:
      - name: sdia-catch-all
        paths:
        - /
        strip_path: false
        methods:
          - POST
          - GET
        plugins:
        - name: gdcr
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gdcr-plugin
  namespace: sdia
data:
  handler.lua: |
    -- SDIA GDCR Handler v2.2 — SAP CPI Real Integration
    -- Basic Auth — clientid:clientsecret
    -- Ricardo Luz Holanda Viana | March 2026

    local redis = require "resty.redis"

    local CPI_HOST   = "282cc9datrial.it-cpitrial05-rt.cfapps.us10-001.hana.ondemand.com"
    local BASIC_AUTH = "Basic c2ItNWY1ZjRlZGQtM2FmZi00NGNkLWIyMTItODljNjgwNTI3M2Y2IWI2MDE0NzB8aXQtcnQtMjgyY2M5ZGF0cmlhbCFiMjY2NTU6N2JmNDY2MGUtNzgyZS00NjNkLTllZjktMWJiYTRhMzEzYWE2JHdzUGtzektOQnJSU1ItSjB0NWhodE03cGZXZXp0d3FSV2tidG90U29MZFE9"

    local ACTION_MAP = {
      create      = "c", post        = "c", insert       = "c",
      read        = "r", get         = "r", retrieve     = "r",
      update      = "u", put         = "u", modify       = "u",
      delete      = "d", remove      = "d",
      sync        = "s", synchronize = "s",
      transfer    = "t", send        = "t",
      notify      = "n", notification = "n",
      approve     = "a", authorize   = "a",
      query       = "q", search      = "q",
    }

    local RESOURCE_MAP = {
      manifests = "manifest",
    }

    local function split_path(path)
      local result = {}
      for segment in string.gmatch(path, "[^/]+") do
        table.insert(result, segment)
      end
      return result
    end

    local function redis_get(path)
      local red = redis:new()
      red:set_timeout(1000)
      local ok, err = red:connect("redis-service.sdia.svc.cluster.local", 6379)
      if not ok then
        return nil, "redis connect failed: " .. (err or "")
      end
      local val = red:get(path)
      if not val or val == ngx.null then
        return nil, "route not found in KVM"
      end
      return val
    end

    local GdcrHandler = {
      PRIORITY = 1000,
      VERSION  = "2.2.0",
    }

    function GdcrHandler:access(conf)
      local path = ngx.var.uri

      -- Stage 1: Domain Inference
      local parts    = split_path(path)
      local domain   = parts[1]
      local resource = parts[2]
      local action   = parts[3]
      local backend  = parts[4]

      -- Stage 2: Validate
      if not domain or not resource or not action or not backend then
        return kong.response.exit(400, {
          status  = "error",
          message = "invalid semantic URL — expected /{domain}/{entity}/{action}/{target}",
          path    = path,
        })
      end

      -- Stage 3: Fast Fail — Redis KVM lookup
      local route_value, err = redis_get(path)
      if not route_value then
        return kong.response.exit(404, {
          status  = "error",
          message = err or "route not found in KVM",
          path    = path,
          hint    = "register route in Redis KVM first",
        })
      end

      -- Stage 4: Normalize action
      local action_norm = ACTION_MAP[action:lower()] or action:sub(1, 1)

      -- Stage 5: Parse interface_id and protocol from Redis value
      local interface_id, protocol = route_value:match("^(.+):(.+)$")

      -- Stage 6: Extract id suffix
      local id_suffix = interface_id:match("(id%d+)$")

      -- Stage 7: Build CPI path and forward
      local prefix       = (protocol == "soap") and "cxf" or "http"
      local resource_norm = RESOURCE_MAP[resource] or resource
      local cpi_path     = string.format("/%s/dcrp/%s/%s/%s", prefix, resource_norm, action_norm, id_suffix)
      local content_type = (protocol == "soap") and "text/xml; charset=utf-8" or "application/json"

      kong.service.set_target(CPI_HOST, 443)
      kong.service.request.set_path(cpi_path)
      kong.service.request.set_header("Authorization",    BASIC_AUTH)
      kong.service.request.set_header("Content-Type",     content_type)
      kong.service.request.set_header("X-SDIA-Domain",    domain)
      kong.service.request.set_header("X-SDIA-Version",   "2.2.0")
      kong.service.request.set_header("X-SDIA-Interface", interface_id)
    end

    return GdcrHandler

  schema.lua: |
    return {
      name = "gdcr",
      fields = {
        { config = {
          type = "record",
          fields = {}
        }}
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: sdia
  labels:
    app: kong
    component: sdia-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
        component: sdia-gateway
    spec:
      containers:
      - name: kong
        image: kong:3.6
        env:
        - name: KONG_DATABASE
          value: "off"
        - name: KONG_DECLARATIVE_CONFIG
          value: "/kong/declarative/kong.yaml"
        - name: KONG_PROXY_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_ADMIN_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_PROXY_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_ADMIN_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_ADMIN_LISTEN
          value: "0.0.0.0:8001"
        - name: KONG_PLUGINS
          value: "bundled,gdcr"
        - name: KONG_LUA_PACKAGE_PATH
          value: "/usr/local/share/lua/5.1/kong/plugins/gdcr/?.lua;;"
        ports:
        - name: proxy
          containerPort: 8000
        - name: admin
          containerPort: 8001
        volumeMounts:
        - name: kong-declarative
          mountPath: /kong/declarative
        - name: gdcr-plugin
          mountPath: /usr/local/share/lua/5.1/kong/plugins/gdcr
      volumes:
      - name: kong-declarative
        configMap:
          name: kong-declarative
      - name: gdcr-plugin
        configMap:
          name: gdcr-plugin
---
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: sdia
spec:
  type: NodePort
  selector:
    app: kong
  ports:
  - name: proxy
    port: 8000
    targetPort: 8000
    nodePort: 30800
  - name: admin
    port: 8001
    targetPort: 8001
    nodePort: 30801
