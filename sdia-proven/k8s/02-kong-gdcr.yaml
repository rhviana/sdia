apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative
  namespace: sdia
data:
  kong.yaml: |
    _format_version: "3.0"
    _transform: true

    services:
    - name: sdia-mock-service
      url: http://127.0.0.1:8000
      routes:
      - name: sdia-catch-all
        paths:
        - /
        strip_path: false
        plugins:
        - name: gdcr
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gdcr-plugin
  namespace: sdia
data:
  handler.lua: |
    local redis = require "resty.redis"

    local ACTION_MAP = {
      create = "c", post = "c", insert = "c",
      read   = "r", get  = "r", retrieve = "r",
      update = "u", put  = "u", modify   = "u",
      delete = "d", remove = "d",
      sync   = "s", synchronize = "s",
      transfer = "t", send = "t",
      notify = "n", notification = "n",
    }

    local function split_path(path)
      local result = {}
      for segment in string.gmatch(path, "[^/]+") do
        table.insert(result, segment)
      end
      return result
    end

    local function redis_get(path)
      local red = redis:new()
      red:set_timeout(1000)
      local ok, err = red:connect("redis-service.sdia.svc.cluster.local", 6379)
      if not ok then
        return nil, "failed to connect to redis: " .. (err or "")
      end
      local val, err = red:get(path)
      if not val or val == ngx.null then
        return nil, "route not found"
      end
      return val
    end

    local GdcrHandler = {
      PRIORITY = 1000,
      VERSION  = "1.0.0",
    }

    function GdcrHandler:access(conf)
      local path = ngx.var.uri

      local parts    = split_path(path)
      local domain   = parts[1]
      local resource = parts[2]
      local action   = parts[3]
      local backend  = parts[4]

      if not domain or not resource or not action or not backend then
        return kong.response.exit(400, {
          status  = "error",
          message = "invalid semantic URL — expected /{domain}/{entity}/{action}/{target}",
          path    = path,
        })
      end

      local route_value, err = redis_get(path)
      if not route_value then
        return kong.response.exit(404, {
          status  = "error",
          message = err or "route not found in KVM",
          path    = path,
          hint    = "register route in Redis KVM first",
        })
      end

      local action_norm = ACTION_MAP[action:lower()] or action:sub(1, 1)
      local interface_id, protocol = route_value:match("^(.+):(.+)$")
      local id_suffix = interface_id:match("(id%d+)$")

      local target_url = string.format(
        "https://cpi-host/%s/gdcr/%s/%s/%s/%s",
        protocol, resource, action_norm, backend, id_suffix
      )

      kong.response.exit(200, {
        status        = "success",
        sdia_version  = "1.0.0",
        domain        = domain,
        resource      = resource,
        action        = action,
        action_norm   = action_norm,
        backend       = backend,
        interface_id  = interface_id,
        protocol      = protocol,
        generated_url = target_url,
        kvm_source    = "redis-k8s",
      })
    end

    return GdcrHandler

  schema.lua: |
    return {
      name = "gdcr",
      fields = {
        { config = {
          type = "record",
          fields = {}
        }}
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: sdia
  labels:
    app: kong
    component: sdia-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
        component: sdia-gateway
    spec:
      containers:
      - name: kong
        image: kong:3.6
        env:
        - name: KONG_DATABASE
          value: "off"
        - name: KONG_DECLARATIVE_CONFIG
          value: "/kong/declarative/kong.yaml"
        - name: KONG_PROXY_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_ADMIN_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_PROXY_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_ADMIN_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_ADMIN_LISTEN
          value: "0.0.0.0:8001"
        - name: KONG_PLUGINS
          value: "bundled,gdcr"
        - name: KONG_LUA_PACKAGE_PATH
          value: "/usr/local/share/lua/5.1/kong/plugins/gdcr/?.lua;;"
        ports:
        - name: proxy
          containerPort: 8000
        - name: admin
          containerPort: 8001
        volumeMounts:
        - name: kong-declarative
          mountPath: /kong/declarative
        - name: gdcr-plugin
          mountPath: /usr/local/share/lua/5.1/kong/plugins/gdcr
      volumes:
      - name: kong-declarative
        configMap:
          name: kong-declarative
      - name: gdcr-plugin
        configMap:
          name: gdcr-plugin
---
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: sdia
spec:
  type: NodePort
  selector:
    app: kong
  ports:
  - name: proxy
    port: 8000
    targetPort: 8000
    nodePort: 30800
  - name: admin
    port: 8001
    targetPort: 8001
    nodePort: 30801
