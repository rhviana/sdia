---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodered
  namespace: sdia
  labels:
    app: nodered
    component: sdia-iot-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodered
  template:
    metadata:
      labels:
        app: nodered
        component: sdia-iot-bridge
    spec:
      containers:
      - name: nodered
        image: nodered/node-red:3.1
        ports:
        - containerPort: 1880
        env:
        - name: NODE_RED_ENABLE_PROJECTS
          value: "false"
        volumeMounts:
        - name: nodered-flows
          mountPath: /data/flows.json
          subPath: flows.json
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: nodered-flows
        configMap:
          name: nodered-flows
---
apiVersion: v1
kind: Service
metadata:
  name: nodered-service
  namespace: sdia
spec:
  selector:
    app: nodered
  ports:
  - name: ui
    port: 1880
    targetPort: 1880
    nodePort: 31880
  type: NodePort
