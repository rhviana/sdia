_format_version: "3.0"
_transform: true

# Replace YOUR-TRIAL with your SAP BTP Trial subdomain
# Example: 282cc9datrial.it-cpitrial05-rt.cfapps.us10-001.hana.ondemand.com
# Get your credentials from BTP Cockpit → Integration Suite → Service Keys

services:
  - name: cpi-service
    url: https://YOUR-TRIAL.it-cpitrial05-rt.cfapps.us10-001.hana.ondemand.com
    protocol: https
    port: 443
    routes:
      - name: sdia-catch-all
        paths:
          - /
        strip_path: false
        methods:
          - POST
          - GET
    plugins:
      - name: gdcr
